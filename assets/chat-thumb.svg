<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="320" height="180" fill="#e8e8e8"/>
  
  <!-- 聊天框背景 -->
  <rect x="20" y="20" width="280" height="140" fill="#ffffff" rx="16" ry="16"/>
  
  <!-- 頭部 -->
  <rect x="20" y="20" width="280" height="35" fill="#f5f5f5" rx="16" ry="16"/>
  
  <!-- 頭部文字 -->
  <text x="30" y="42" font-family="Arial, sans-serif" font-size="12" fill="#666" font-weight="bold">https://ntfy.sh</text>
  
  <!-- 左邊消息氣泡 (灰色) -->
  <rect x="30" y="75" width="120" height="28" fill="#e0e0e0" rx="8" ry="8"/>
  <text x="40" y="95" font-family="Arial, sans-serif" font-size="11" fill="#333">你好呀</text>
  
  <!-- 右邊消息氣泡 (青綠色) -->
  <rect x="170" y="110" width="120" height="28" fill="#1abc9c" rx="8" ry="8"/>
  <text x="180" y="130" font-family="Arial, sans-serif" font-size="11" fill="#ffffff">安安:冰塊</text>
  
  <!-- 聊天圖標 -->
  <circle cx="280" cy="155" r="12" fill="#1abc9c" opacity="0.3"/>
  <text x="276" y="161" font-family="Arial, sans-serif" font-size="16">💬</text>
</svg>