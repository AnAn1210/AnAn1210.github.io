<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>雲端記事本 - 作品 06</title>
  <style>
    :root {
      --bg: #ead8f7;
      --bg2: #d7b9ef;
      --card: rgba(255, 255, 255, 0.95);
      --card-2: rgba(248, 242, 255, 0.98);
      --ink: #43304f;
      --muted: #8d74a0;
      --purple: #a75fd3;
      --purple-2: #c58cf0;
      --line: rgba(114, 74, 150, 0.14);
      --shadow: 0 28px 80px rgba(128, 74, 171, 0.16);
      --shadow-soft: 0 10px 28px rgba(145, 86, 196, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.8), transparent 28%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.45), transparent 32%),
        linear-gradient(145deg, var(--bg), var(--bg2));
      padding: 22px 18px 26px;
    }

    .app {
      width: min(980px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .hero,
    .card {
      border-radius: 22px;
      overflow: hidden;
      background: var(--card);
      border: 1px solid rgba(122, 72, 166, 0.10);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 22px;
      background: linear-gradient(180deg, #a95ad6 0%, #9a56c4 100%);
      color: #fff;
    }

    .brand {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .brand-mark {
      width: 18px;
      height: 18px;
      margin-top: 4px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff, #ead8f7 48%, #c98bea 76%, #8f4dbb 100%);
      box-shadow: 0 0 0 4px rgba(255,255,255,0.14);
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      line-height: 1.1;
      letter-spacing: 0.03em;
    }

    .sub {
      margin: 8px 0 0;
      color: rgba(255,255,255,0.84);
      line-height: 1.6;
      max-width: 72ch;
      font-size: 0.95rem;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      font-weight: 800;
      font-size: 0.9rem;
    }

    .status-pill::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #8eff9b;
      box-shadow: 0 0 0 4px rgba(142,255,155,0.14);
    }

    .grid {
      display: grid;
      grid-template-columns: 1.35fr 0.85fr;
      gap: 18px;
    }

    .card {
      background: linear-gradient(180deg, var(--card-2), #fff);
      padding: 18px;
    }

    .title {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--ink);
    }

    .desc {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.8;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 11px 16px;
      border: 1px solid var(--line);
      color: var(--ink);
      text-decoration: none;
      background: rgba(255,255,255,0.95);
      font-weight: 800;
      transition: transform 0.12s ease, box-shadow 0.18s ease;
    }

    .button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 26px rgba(150, 88, 197, 0.12);
    }

    .button.primary {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(180deg, var(--purple-2), var(--purple));
    }

    .note-card {
      border-radius: 18px;
      border: 1px solid rgba(122, 72, 166, 0.10);
      background: #fff;
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }

    .note-head {
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid rgba(122, 72, 166, 0.12);
      color: var(--purple);
      font-weight: 800;
    }

    .note-head .left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .note-icon {
      width: 24px;
      height: 24px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #efe4fb, #dfc2f6);
      color: #8a51b5;
      font-size: 0.92rem;
      flex: 0 0 auto;
    }

    .note-body {
      padding: 16px;
    }

    .mock-paper {
      min-height: 280px;
      border-radius: 16px;
      border: 1px solid rgba(122, 72, 166, 0.10);
      background:
        linear-gradient(180deg, #fff, #fff),
        repeating-linear-gradient(to bottom, transparent 0, transparent 34px, rgba(114, 74, 150, 0.08) 35px);
      position: relative;
      overflow: hidden;
    }

    .mock-paper::before {
      content: "今天是星期幾";
      position: absolute;
      left: 16px;
      top: 16px;
      color: #554061;
      font-size: 0.96rem;
    }

    .mock-paper::after {
      content: "";
      position: absolute;
      inset: 44px 0 0;
      background-image: linear-gradient(to bottom, transparent 0, transparent 34px, rgba(114, 74, 150, 0.08) 35px);
      background-size: 100% 35px;
      opacity: 0.9;
      pointer-events: none;
    }

    .mock-text {
      position: absolute;
      left: 16px;
      top: 48px;
      right: 16px;
      color: #43304f;
      font-size: 0.98rem;
      line-height: 1.9;
      white-space: pre-wrap;
    }

    .meta {
      margin-top: 14px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 0.92rem;
    }

    .list {
      margin: 12px 0 0;
      padding-left: 18px;
      line-height: 1.9;
      color: var(--ink);
    }

    @media (max-width: 780px) {
      body { padding: 12px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="brand">
        <span class="brand-mark"></span>
        <div>
          <h1>雲端記事本</h1>
          <p class="sub">這個作品是以單一 Google Apps Script 完成的雲端記事本，介面風格與實際 Web App 一致，直接讀寫 Google Drive 中的 <strong>記事本.txt</strong>。</p>
        </div>
      </div>
      <div class="status-pill">已儲存</div>
    </section>

    <section class="grid">
      <article class="card">
        <h2 class="title">作品重點</h2>
        <p class="desc">頁面採紫色記事本風格，包含標題列、狀態膠囊、編輯區、字數與最後修改資訊，接近你提供的畫面。</p>
        <ul class="list">
          <li>單檔 GAS，不依賴前端 index.html</li>
          <li>直接透過 DriveApp 操作雲端資料夾</li>
          <li>自動建立或開啟 <strong>記事本.txt</strong></li>
        </ul>
        <div class="actions">
          <a class="button primary" href="https://script.google.com/macros/s/AKfycbwE5KMiIpikitZGF718YtqU6NlTd4hjJnb5_N7oA2pGs59j08TRU52Pm_r6Sg25U-qI0w/exec" target="_blank" rel="noopener">開啟記事本</a>
          <a class="button" href="../index.html">回作品集</a>
        </div>
        <div class="meta">把上方網址換成你實際部署的 `/exec` 連結，就能直接開啟作品。</div>
      </article>

      <aside class="card">
        <div class="note-card">
          <div class="note-head">
            <div class="left"><span class="note-icon">文</span><span>記事本.txt</span></div>
            <div>已儲存</div>
          </div>
          <div class="note-body">
            <div class="mock-paper">
              <div class="mock-text">今天是星期幾</div>
            </div>
          </div>
        </div>
      </aside>
    </section>
  </main>
</body>
</html>
