<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">工程用計算機縮圖</title>
  <desc id="desc">藍色機身與綠色螢幕的科學計算機介面。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#33435a"/>
      <stop offset="1" stop-color="#243247"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#b3c5a6"/>
      <stop offset="1" stop-color="#a6bb9a"/>
    </linearGradient>
  </defs>

  <rect width="640" height="360" fill="url(#bg)"/>
  <path d="M0 0H210L130 180H0Z" fill="#ffffff10"/>
  <text x="24" y="58" font-size="46" font-family="'Noto Sans TC', sans-serif" font-weight="700" fill="#f0f4f8">何帥</text>
  <text x="390" y="58" font-size="36" font-family="'Noto Sans TC', sans-serif" fill="#d6e0eb">SCIENTIFIC CALCULATOR</text>

  <rect x="12" y="92" width="616" height="240" rx="24" fill="url(#screen)" stroke="#7f9576" stroke-width="2"/>
  <rect x="544" y="110" width="72" height="38" rx="19" fill="none" stroke="#7f9576" stroke-width="2"/>
  <text x="563" y="136" font-size="30" font-family="'Noto Sans TC', sans-serif" font-weight="700" fill="#546152">DEG</text>

  <text x="505" y="204" font-size="62" text-anchor="end" font-family="'Noto Sans TC', sans-serif" fill="#2e3d35">sin(30)</text>
  <text x="594" y="288" font-size="96" text-anchor="end" font-family="'Noto Sans TC', sans-serif" font-weight="700" fill="#1f2b22">0.5</text>

  <rect x="24" y="24" width="190" height="52" rx="12" fill="#ffffffd1"/>
  <text x="44" y="58" font-size="32" font-family="'Noto Sans TC', sans-serif" fill="#2f3c30">工程計算機</text>
</svg>
