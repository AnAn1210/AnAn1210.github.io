<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>雲端記事本 - 作品 06</title>
  <style>
    :root {
      --bg: #f2f2f2;
      --bg2: #dedede;
      --card: rgba(255, 255, 255, 0.96);
      --card-2: rgba(250, 250, 250, 0.98);
      --ink: #141414;
      --muted: #666666;
      --accent: #202020;
      --accent-2: #5b5b5b;
      --line: rgba(0, 0, 0, 0.12);
      --shadow: 0 28px 80px rgba(0, 0, 0, 0.14);
      --shadow-soft: 0 10px 28px rgba(0, 0, 0, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.8), transparent 28%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.45), transparent 32%),
        linear-gradient(145deg, var(--bg), var(--bg2));
      padding: 22px 18px 26px;
    }

    .app {
      width: min(980px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .hero,
    .card {
      border-radius: 22px;
      overflow: hidden;
      background: var(--card);
      border: 1px solid rgba(0, 0, 0, 0.10);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 22px;
      background: linear-gradient(180deg, #1f1f1f 0%, #3a3a3a 100%);
      color: #fff;
    }

    .brand {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .brand-mark {
      width: 18px;
      height: 18px;
      margin-top: 4px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff, #d9d9d9 48%, #9a9a9a 76%, #3a3a3a 100%);
      box-shadow: 0 0 0 4px rgba(255,255,255,0.14);
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      line-height: 1.1;
      letter-spacing: 0.03em;
    }

    .sub {
      margin: 8px 0 0;
      color: rgba(255,255,255,0.84);
      line-height: 1.6;
      max-width: 72ch;
      font-size: 0.95rem;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      font-weight: 800;
      font-size: 0.9rem;
    }

    .status-pill::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #8eff9b;
      box-shadow: 0 0 0 4px rgba(142,255,155,0.14);
    }

    .grid {
      display: grid;
      grid-template-columns: 1.35fr 0.85fr;
      gap: 18px;
    }

    .card {
      background: linear-gradient(180deg, var(--card-2), #fff);
      padding: 18px;
    }

    .title {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--ink);
    }

    .desc {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.8;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 11px 16px;
      border: 1px solid var(--line);
      color: var(--ink);
      text-decoration: none;
      background: rgba(255,255,255,0.95);
      font-weight: 800;
      transition: transform 0.12s ease, box-shadow 0.18s ease;
    }

    .button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.12);
    }

    .button.primary {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(180deg, #4c4c4c, #1f1f1f);
    }

    .note-card {
      border-radius: 18px;
      border: 1px solid rgba(0, 0, 0, 0.10);
      background: #fff;
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }

    .note-head {
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid rgba(0, 0, 0, 0.12);
      color: var(--accent);
      font-weight: 800;
    }

    .note-head .left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .note-icon {
      width: 24px;
      height: 24px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #efefef, #dadada);
      color: #2a2a2a;
      font-size: 0.92rem;
      flex: 0 0 auto;
    }

    .note-body {
      padding: 16px;
    }

    .mock-paper {
      min-height: 280px;
      border-radius: 16px;
      border: 1px solid rgba(0, 0, 0, 0.10);
      background:
        linear-gradient(180deg, #fff, #fff),
        repeating-linear-gradient(to bottom, transparent 0, transparent 34px, rgba(0, 0, 0, 0.08) 35px);
      position: relative;
      overflow: hidden;
    }

    .mock-paper::before {
      content: "今天是星期幾";
      position: absolute;
      left: 16px;
      top: 16px;
      color: #444444;
      font-size: 0.96rem;
    }

    .mock-paper::after {
      content: "";
      position: absolute;
      inset: 44px 0 0;
      background-image: linear-gradient(to bottom, transparent 0, transparent 34px, rgba(0, 0, 0, 0.08) 35px);
      background-size: 100% 35px;
      opacity: 0.9;
      pointer-events: none;
    }

    .mock-text {
      position: absolute;
      left: 16px;
      top: 48px;
      right: 16px;
      color: #222222;
      font-size: 0.98rem;
      line-height: 1.9;
      white-space: pre-wrap;
    }

    .meta {
      margin-top: 14px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 0.92rem;
    }

    .list {
      margin: 12px 0 0;
      padding-left: 18px;
      line-height: 1.9;
      color: var(--ink);
    }

    @media (max-width: 780px) {
      body { padding: 12px; }
      .grid { grid-template-columns: 1fr; }
    }
    .cover{width:100%;display:block;object-fit:cover;max-height:320px;border-radius:18px}
    /* new layout for live note */
    .topbar {
      background: linear-gradient(90deg,#8b5cf6,#c084fc);
      color: #fff;
      border-radius: 18px;
      padding: 18px 20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }
    .top-left { display:flex; gap:12px; align-items:center }
    .top-mark { width:44px; height:44px; border-radius:10px; background:rgba(255,255,255,0.12); display:grid; place-items:center; font-weight:800 }
    .top-title { font-size:1.15rem; font-weight:900; margin:0 }
    .top-sub { margin:4px 0 0; opacity:0.95; font-size:0.95rem }
    .save-pill { background: rgba(255,255,255,0.12); padding:8px 12px; border-radius:999px; font-weight:800; display:inline-flex; gap:10px; align-items:center }
    .dot { width:10px; height:10px; border-radius:50%; box-shadow:0 0 0 6px rgba(0,255,150,0.08) }

    .note-wrap { background: linear-gradient(180deg,#fff,#fff); border-radius:18px; padding:18px; box-shadow: 0 20px 60px rgba(0,0,0,0.08); }
    .note-head { display:flex; align-items:center; justify-content:space-between; gap:12px }
    .file-meta { display:flex; gap:12px; align-items:center }
    .file-icon { width:36px; height:36px; border-radius:9px; background: linear-gradient(180deg,#f3f0ff,#efe6ff); display:grid; place-items:center; font-weight:800 }

    .editor { margin-top:12px }
    textarea.editor-area { width:100%; min-height:420px; border-radius:12px; padding:20px; border:1px solid rgba(0,0,0,0.06); resize:vertical; font-size:1.05rem; line-height:1.9; font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif }

    .note-footer { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:14px }
    .meta-left { color: #6b6b6b; font-size:0.92rem }
    .controls { display:flex; gap:12px }
    .btn { padding:10px 18px; border-radius:999px; border:1px solid rgba(0,0,0,0.06); background:#fff; cursor:pointer; font-weight:800 }
    .btn.ghost { background: linear-gradient(180deg,#fff,#f6f6f8) }
    .btn.save { color:#fff; background: linear-gradient(90deg,#8b5cf6,#c084fc); border:none; padding:10px 20px }

    @media (max-width:780px){ .grid{grid-template-columns:1fr} .note-wrap{padding:16px} textarea.editor-area{min-height:260px} }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <div class="top-left">
        <div class="top-mark">雲</div>
        <div>
          <h2 class="top-title">雲端記事本</h2>
          <div class="top-sub">直接使用 GAS 與 Google Drive 儲存記事</div>
        </div>
      </div>
      <div class="save-pill"><span class="dot" id="status-dot" style="background:#8eff9b"></span><span id="status-text">已儲存</span></div>
    </div>

    <div style="height:18px"></div>

    <div class="note-wrap">
      <div class="note-head">
        <div class="file-meta">
          <div class="file-icon">文</div>
          <div>
            <div style="font-weight:800">記事本.txt</div>
            <div style="font-size:0.9rem;color:#6c6c6c">直接使用 GAS 存取 Google Drive</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <button class="btn ghost" id="reloadBtn">重新載入</button>
          <button class="btn save" id="saveBtn">Save</button>
        </div>
      </div>

      <div class="editor">
        <textarea class="editor-area" id="editor" placeholder="在此編輯...">今天是星期幾</textarea>
      </div>

      <div class="note-footer">
        <div class="meta-left"><span id="charCount">字數：5</span> · <span id="lastSaved">最後修改：--</span></div>
        <div class="controls">
          <button class="btn ghost" id="reloadBtn2">重新載入</button>
          <button class="btn save" id="saveBtn2">Save</button>
        </div>
      </div>
    </div>
    <div style="height:18px"></div>

    <div style="text-align:center;color:#888;margin-top:8px">若要部署真實雲端，請點上方「開啟記事本」並改為你的 GAS `/exec` 連結。</div>
    <div style="text-align:center;margin-top:12px"><a class="button" href="../index.html">回作品集</a> <a class="button" href="https://script.google.com/macros/s/AKfycbwE5KMiIpikitZGF718YtqU6NlTd4hjJnb5_N7oA2pGs59j08TRU52Pm_r6Sg25U-qI0w/exec" target="_blank" rel="noopener">開啟 GAS 部署</a></div>
  </main>

  <script>
    const editor = document.getElementById('editor');
    const saveBtn = document.getElementById('saveBtn');
    const saveBtn2 = document.getElementById('saveBtn2');
    const reloadBtn = document.getElementById('reloadBtn');
    const reloadBtn2 = document.getElementById('reloadBtn2');
    const charCount = document.getElementById('charCount');
    const lastSaved = document.getElementById('lastSaved');
    const statusText = document.getElementById('status-text');
    const statusDot = document.getElementById('status-dot');

    const KEY = 'notebook.txt.v1';

    function updateMeta() {
      const text = editor.value || '';
      charCount.textContent = '字數：' + text.length;
      const meta = JSON.parse(localStorage.getItem(KEY + '.meta') || 'null');
      lastSaved.textContent = meta ? ('最後修改：' + meta.time) : '最後修改：--';
    }

    function setSaved() {
      statusText.textContent = '已儲存';
      statusDot.style.background = '#8eff9b';
    }

    function setSaving() {
      statusText.textContent = '儲存中...';
      statusDot.style.background = '#ffd86b';
    }

    function save() {
      setSaving();
      const text = editor.value || '';
      localStorage.setItem(KEY, text);
      const t = new Date();
      const meta = { time: t.toLocaleString() };
      localStorage.setItem(KEY + '.meta', JSON.stringify(meta));
      setTimeout(() => { setSaved(); updateMeta(); }, 350);
    }

    function reload() {
      const val = localStorage.getItem(KEY);
      if (val !== null) editor.value = val;
      updateMeta();
      setSaved();
    }

    editor.addEventListener('input', () => { updateMeta(); statusText.textContent = '未儲存'; statusDot.style.background = '#ff8b8b'; });
    saveBtn.addEventListener('click', save); saveBtn2.addEventListener('click', save);
    reloadBtn.addEventListener('click', reload); reloadBtn2.addEventListener('click', reload);

    // init
    reload();
  </script>
</body>
</html>
