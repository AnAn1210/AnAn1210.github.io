# AnAn1210.github.io<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>打地鼠</title>
  <style>
    :root {
      --bg-1: #f8f5ec;
      --bg-2: #d8e7c8;
      --card: #fffef9;
      --ink: #21312a;
      --accent: #d46a37;
      --accent-dark: #b95122;
      --good: #2f9e44;
      --bad: #c92a2a;
      --hole: #5c3b2e;
      --mole: #7e553c;
      --shadow: rgba(18, 24, 20, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 15%, rgba(255, 255, 255, 0.65), transparent 36%),
        radial-gradient(circle at 80% 0%, rgba(255, 255, 255, 0.45), transparent 30%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      padding: clamp(10px, 3vw, 20px);
    }

    .game {
      width: min(740px, 100%);
      background: var(--card);
      border-radius: 20px;
      box-shadow: 0 16px 40px var(--shadow);
      overflow: hidden;
      margin: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 20px;
      background: linear-gradient(180deg, #fff, #f7f2e6);
      border-bottom: 1px solid #efe8d7;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      letter-spacing: 0.4px;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .pill {
      background: #fff;
      border: 1px solid #ebdfc7;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 0.95rem;
      font-weight: 600;
      min-width: 110px;
      text-align: center;
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    button {
      border: 0;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      padding: 11px 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.2s ease;
    }

    button:hover {
      background: var(--accent-dark);
    }

    button:active {
      transform: translateY(1px) scale(0.98);
    }

    button:disabled {
      background: #b8afa2;
      cursor: not-allowed;
    }

    .message {
      min-height: 1.2em;
      font-size: 0.95rem;
      font-weight: 700;
      text-align: right;
    }

    .message.good {
      color: var(--good);
    }

    .message.bad {
      color: var(--bad);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, minmax(90px, 1fr));
      gap: clamp(10px, 2.2vw, 18px);
      padding: 22px;
      background:
        linear-gradient(180deg, #e7efdc, #dce9cc 65%, #d2dfbe);
    }

    .hole {
      position: relative;
      aspect-ratio: 1 / 0.78;
      min-height: 92px;
      border: 0;
      border-radius: 22px;
      background:
        radial-gradient(ellipse at center, #3b241b 36%, var(--hole) 70%);
      box-shadow: inset 0 -5px 0 rgba(0, 0, 0, 0.24), 0 6px 14px rgba(0, 0, 0, 0.14);
      cursor: pointer;
      overflow: hidden;
      isolation: isolate;
      touch-action: manipulation;
    }

    .hole::before {
      content: "";
      position: absolute;
      inset: auto 14% 8%;
      height: 9%;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      filter: blur(1px);
      z-index: 2;
      pointer-events: none;
    }

    .mole {
      position: absolute;
      left: 50%;
      bottom: 8%;
      width: 56%;
      height: 72%;
      transform: translate(-50%, 100%);
      border-radius: 45% 45% 36% 36%;
      background:
        radial-gradient(circle at 50% 22%, #9d7152 14%, transparent 15%),
        radial-gradient(circle at 36% 24%, #1d1612 3%, transparent 4%),
        radial-gradient(circle at 64% 24%, #1d1612 3%, transparent 4%),
        radial-gradient(circle at 50% 42%, #e7c3a9 10%, transparent 11%),
        linear-gradient(180deg, #8d6046, var(--mole));
      box-shadow: inset 0 -10px 14px rgba(0, 0, 0, 0.2);
      transition: transform 0.2s ease;
      z-index: 1;
      pointer-events: none;
    }

    .hole.up .mole {
      transform: translate(-50%, 0);
    }

    .hole.hit .mole {
      transform: translate(-50%, 4%) scale(0.94);
      filter: saturate(0.7);
    }

    .footer {
      padding: 0 22px 18px;
      font-size: 0.9rem;
      color: #5f6c63;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: space-between;
      align-items: center;
    }

    .credit {
      font-weight: 700;
      color: #385648;
    }

    @media (max-width: 620px) {
      body {
        align-items: start;
      }

      .game {
        border-radius: 16px;
      }

      .topbar {
        grid-template-columns: 1fr;
        gap: 12px;
        padding: 14px;
      }

      .controls {
        justify-content: space-between;
      }

      button {
        min-height: 44px;
        font-size: 1rem;
      }

      .message {
        text-align: left;
      }

      .pill {
        min-width: 96px;
      }

      .board {
        grid-template-columns: repeat(3, minmax(80px, 1fr));
        gap: 10px;
        padding: 14px;
      }

      .hole {
        min-height: 80px;
      }

      .footer {
        font-size: 0.84rem;
        padding: 0 14px 14px;
      }
    }
  </style>
</head>
<body>
  <main class="game" aria-label="打地鼠遊戲">
    <header class="topbar">
      <section>
        <h1>打地鼠</h1>
        <div class="stats" aria-live="polite">
          <div class="pill">分數: <span id="score">0</span></div>
          <div class="pill">最高分: <span id="best">0</span></div>
          <div class="pill">時間: <span id="time">30</span> 秒</div>
        </div>
      </section>
      <section class="controls">
        <button id="startBtn" type="button">開始</button>
        <div id="message" class="message">按下開始</div>
      </section>
    </header>

    <section id="board" class="board" aria-label="遊戲盤面"></section>

    <p class="footer">
      <span>看到地鼠冒出來就點下去，點空不會扣分。</span>
      <span class="credit">設計者：安安</span>
    </p>
  </main>

  <script>
    const HOLE_COUNT = 9;
    const ROUND_SECONDS = 30;
    const MIN_POP_MS = 450;
    const MAX_POP_MS = 900;

    const board = document.getElementById("board");
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const timeEl = document.getElementById("time");
    const startBtn = document.getElementById("startBtn");
    const messageEl = document.getElementById("message");

    let score = 0;
    let best = Number(localStorage.getItem("whackBest") || 0);
    let timeLeft = ROUND_SECONDS;
    let activeIndex = -1;
    let running = false;
    let roundTimer = null;
    let popTimer = null;
    let audioCtx = null;

    bestEl.textContent = String(best);

    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new AudioContext();
      }
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
    }

    function playTone(freq, durationMs, type = "sine", volume = 0.05) {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = type;
      osc.frequency.setValueAtTime(freq, now);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(volume, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + durationMs / 1000);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(now);
      osc.stop(now + durationMs / 1000 + 0.02);
    }

    function updateMessage(text, type = "") {
      messageEl.textContent = text;
      messageEl.className = "message" + (type ? " " + type : "");
    }

    function randomInt(max) {
      return Math.floor(Math.random() * max);
    }

    function nextPopDelay() {
      return MIN_POP_MS + randomInt(MAX_POP_MS - MIN_POP_MS + 1);
    }

    function clearActiveHole() {
      if (activeIndex < 0) return;
      const active = board.children[activeIndex];
      active.classList.remove("up", "hit");
      activeIndex = -1;
    }

    function popMole() {
      if (!running) return;

      clearActiveHole();
      activeIndex = randomInt(HOLE_COUNT);
      const hole = board.children[activeIndex];
      hole.classList.add("up");

      popTimer = setTimeout(popMole, nextPopDelay());
    }

    function stopGame() {
      running = false;
      startBtn.disabled = false;
      clearInterval(roundTimer);
      clearTimeout(popTimer);
      clearActiveHole();

      if (score > best) {
        best = score;
        localStorage.setItem("whackBest", String(best));
      }

      bestEl.textContent = String(best);
      updateMessage("回合結束", "good");
      playTone(280, 200, "triangle", 0.06);
    }

    function tick() {
      timeLeft -= 1;
      timeEl.textContent = String(timeLeft);
      if (timeLeft <= 0) {
        stopGame();
      }
    }

    function startGame() {
      if (running) return;
      running = true;
      score = 0;
      timeLeft = ROUND_SECONDS;
      scoreEl.textContent = "0";
      timeEl.textContent = String(ROUND_SECONDS);
      startBtn.disabled = true;
      updateMessage("開始！", "good");
      ensureAudio();
      playTone(520, 120, "square", 0.05);

      popMole();
      roundTimer = setInterval(tick, 1000);
    }

    function handleHoleHit(index) {
      if (!running || index !== activeIndex) {
        updateMessage("沒打中", "bad");
        playTone(180, 120, "sawtooth", 0.035);
        return;
      }

      const hole = board.children[index];
      hole.classList.add("hit");
      score += 1;
      scoreEl.textContent = String(score);
      updateMessage("漂亮！", "good");
      playTone(760, 90, "triangle", 0.05);

      clearTimeout(popTimer);
      popTimer = setTimeout(popMole, 140);
    }

    for (let i = 0; i < HOLE_COUNT; i += 1) {
      const hole = document.createElement("button");
      hole.type = "button";
      hole.className = "hole";
      hole.setAttribute("aria-label", `洞 ${i + 1}`);

      const mole = document.createElement("span");
      mole.className = "mole";
      hole.appendChild(mole);

      hole.addEventListener("click", () => handleHoleHit(i));
      board.appendChild(hole);
    }

    startBtn.addEventListener("click", startGame);
  </script>
</body>
</html>
