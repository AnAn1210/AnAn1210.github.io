<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ntfy 聊天視窗</title>
    <style>
      body{font-family:system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans", "Helvetica Neue", Arial; background:#f3f4f6; margin:0; padding:24px;}
      .container{max-width:820px;margin:0 auto;background:#fff;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,.08);overflow:hidden}
      header{display:flex;align-items:center;gap:12px;padding:16px;border-bottom:1px solid #eee}
      header input[type=text]{padding:8px 10px;border:1px solid #ddd;border-radius:6px}
      header button{padding:8px 12px;border-radius:6px;border:0;background:#2563eb;color:#fff;cursor:pointer}
      header .status{margin-left:auto;font-weight:600;color:#6b7280}
      .chat{display:flex;gap:16px;padding:20px;height:60vh}
      .messages{flex:1;overflow:auto;padding:12px;border:1px solid #eee;border-radius:8px;background:#fafafa}
      .input-area{display:flex;flex-direction:column;gap:8px;width:320px}
      .input-area textarea{resize:none;height:100%;min-height:120px;padding:10px;border-radius:8px;border:1px solid #ddd}
      .hint{font-size:13px;color:#6b7280}
      .msg{max-width:75%;padding:8px 12px;margin:8px 0;border-radius:12px;line-height:1.4}
      .left{background:#fff;border:1px solid #e5e7eb;align-self:flex-start}
      .right{background:#2563eb;color:#fff;align-self:flex-end}
      .msg .meta{font-size:12px;color:rgba(0,0,0,.5);margin-bottom:6px}
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <label>頻道(Topic): <input id="topic" type="text" value="drher" /></label>
        <button id="connectBtn">連線 / 訂閱</button>
        <div class="status" id="status">未連線</div>
      </header>

      <div class="chat">
        <div class="messages" id="messages" aria-live="polite"></div>

        <div class="input-area">
          <textarea id="msgInput" placeholder="輸入訊息後按 Enter 送出（Shift+Enter 換行）"></textarea>
          <div class="hint">發送者名稱會包含：<strong>何帥</strong></div>
        </div>
      </div>
    </div>

    <script>
      const topicEl = document.getElementById('topic');
      const connectBtn = document.getElementById('connectBtn');
      const statusEl = document.getElementById('status');
      const messagesEl = document.getElementById('messages');
      const msgInput = document.getElementById('msgInput');

      let es = null;
      let connectedTopic = null;

      function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');}

      function appendMessage(text, side='left', meta=''){const d=document.createElement('div');d.className='msg '+side; if(meta){d.innerHTML='<div class="meta">'+escapeHtml(meta)+'</div>'+escapeHtml(text);}else{d.textContent=text;} messagesEl.appendChild(d); messagesEl.scrollTop = messagesEl.scrollHeight;}

      function setStatus(text){statusEl.textContent = text}

      function subscribe(topic){
        if(es){es.close();es=null}
        const url = `https://ntfy.sh/${encodeURIComponent(topic)}/sse`;
        es = new EventSource(url);
        es.onopen = ()=>{ setStatus('已連線'); connectBtn.textContent='中斷'; topicEl.disabled = true; connectedTopic = topic; }
        es.onmessage = (ev)=>{
          const data = ev.data || '';
          // 若為自己發送（以「何帥: 」開頭）則忽略，以免重覆顯示
          if(data.trim().startsWith('何帥:')) return;
          appendMessage(data, 'left', '頻道訊息');
        };
        es.onerror = (ev)=>{ setStatus('連線錯誤'); console.error('SSE error', ev); }
      }

      function unsubscribe(){ if(es){ es.close(); es=null; } connectedTopic = null; topicEl.disabled = false; setStatus('未連線'); connectBtn.textContent='連線 / 訂閱'; }

      connectBtn.addEventListener('click', ()=>{
        if(es){ unsubscribe(); return; }
        const topic = (topicEl.value || 'drher').trim() || 'drher';
        setStatus('連線中...');
        subscribe(topic);
      });

      async function sendMessage(){
        const text = msgInput.value.replace(/\r/g,'').trim();
        if(!text) return;
        const topic = connectedTopic || ((topicEl.value||'drher').trim() || 'drher');
        const payload = `何帥: ${text}`;
        try{
          await fetch(`https://ntfy.sh/${encodeURIComponent(topic)}`, {method:'POST', headers:{'Content-Type':'text/plain'}, body: payload});
          appendMessage(payload, 'right', '我');
          msgInput.value = '';
          msgInput.focus();
        }catch(err){ console.error(err); appendMessage('送出失敗', 'right', '系統'); }
      }

      msgInput.addEventListener('keydown', (e)=>{
        if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
      });

      // 頁面離開時關閉 SSE
      window.addEventListener('beforeunload', ()=>{ if(es) es.close(); });
    </script>
  </body>
</html>
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>安安的遊戲作品集</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-a: #fff7e8;
      --bg-b: #dff0d0;
      --ink: #1f2e2a;
      --card: #fffdf7;
      --card-edge: #efe4cd;
      --accent: #e06a3d;
      --accent-dark: #b24b22;
      --highlight: #2f8f49;
      --shadow: rgba(39, 34, 25, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans TC", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 12%, rgba(255, 255, 255, 0.75), transparent 30%),
        radial-gradient(circle at 92% 5%, rgba(255, 255, 255, 0.55), transparent 36%),
        linear-gradient(145deg, var(--bg-a), var(--bg-b));
      overflow-x: hidden;
    }

    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(rgba(22, 31, 28, 0.06) 0.7px, transparent 0.7px);
      background-size: 4px 4px;
      opacity: 0.18;
      z-index: -1;
    }

    .wrap {
      width: min(1060px, 92vw);
      margin: 40px auto 56px;
      display: grid;
      gap: 26px;
    }

    .intro {
      background: linear-gradient(140deg, #fffdf8 0%, #fff7ea 100%);
      border: 1px solid var(--card-edge);
      border-radius: 28px;
      box-shadow: 0 16px 30px var(--shadow);
      padding: clamp(20px, 3.2vw, 42px);
      position: relative;
      isolation: isolate;
      animation: rise 0.65s ease both;
    }

    .intro::after {
      content: "";
      position: absolute;
      right: -34px;
      top: -28px;
      width: 170px;
      height: 170px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #ffe6b8, #ffd39a 65%, transparent 66%);
      opacity: 0.65;
      z-index: -1;
    }

    h1 {
      margin: 0;
      font-family: "Noto Serif TC", serif;
      font-size: clamp(2rem, 4.8vw, 3rem);
      line-height: 1.22;
      letter-spacing: 0.02em;
    }

    .hello {
      margin-top: 12px;
      font-size: clamp(1.04rem, 2.2vw, 1.25rem);
      line-height: 1.8;
      max-width: 48ch;
    }

    .tag {
      margin-top: 14px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      border-radius: 999px;
      background: #f3f9ed;
      border: 1px solid #d9e9ca;
      color: #2d5c3a;
      font-weight: 700;
    }

    .works-title {
      margin: 2px 0 0;
      font-family: "Noto Serif TC", serif;
      font-size: clamp(1.4rem, 3.1vw, 1.9rem);
    }

    .works {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--card-edge);
      border-radius: 20px;
      box-shadow: 0 10px 24px rgba(44, 40, 31, 0.12);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transform: translateY(14px);
      opacity: 0;
      animation: fade-up 0.6s ease forwards;
    }

    .card:nth-child(2) {
      animation-delay: 0.1s;
    }

    .thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      display: block;
      transition: transform 0.35s ease;
      background: #edf5dc;
    }

    .card:hover .thumb,
    .card:focus-visible .thumb {
      transform: scale(1.05);
    }

    .content {
      padding: 14px 15px 16px;
    }

    .num {
      color: #5a7a5d;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .name {
      margin-top: 4px;
      font-size: 1.3rem;
      font-weight: 800;
    }

    .go {
      margin-top: 8px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 700;
      color: var(--accent-dark);
    }

    .card:hover .go,
    .card:focus-visible .go {
      color: var(--accent);
    }

    .footer {
      margin-top: 6px;
      color: #52655b;
      font-size: 0.93rem;
    }

    @media (max-width: 820px) {
      .wrap {
        margin-top: 24px;
      }

      .works {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <main class="wrap">
    <section class="intro" aria-label="安安自我介紹">
      <h1>嗨，我是安安</h1>
      <p class="hello">
        我喜歡把有趣的點子做成可以互動的小遊戲，
        從畫面設計到遊戲規則都自己動手完成。下面是我目前的六個作品，歡迎點進去玩玩看。
      </p>
      <span class="tag">遊戲開發 · 前端練習 · 創作中</span>
    </section>

    <h2 class="works-title">我的遊戲作品</h2>

    <section class="works" aria-label="作品列表">
      <a class="card" href="1/index.html" aria-label="前往打地鼠作品頁面">
        <img class="thumb" src="assets/whac-a-mole-thumb.svg" alt="打地鼠遊戲縮圖" />
        <div class="content">
          <div class="num">作品 01</div>
          <div class="name">打地鼠</div>
          <div class="go">立即遊玩 →</div>
        </div>
      </a>

      <a class="card" href="2/index.html" aria-label="前往貪吃蛇作品頁面">
        <img class="thumb" src="assets/snake-thumb.svg" alt="貪吃蛇遊戲縮圖" />
        <div class="content">
          <div class="num">作品 02</div>
          <div class="name">貪吃蛇</div>
          <div class="go">立即遊玩 →</div>
        </div>
      </a>

      <a class="card" href="3/index.html" aria-label="前往工程用計算機作品頁面">
        <img class="thumb" src="assets/calculator-thumb.svg" alt="工程用計算機縮圖" />
        <div class="content">
          <div class="num">作品 03</div>
          <div class="name">工程用計算機</div>
          <div class="go">立即使用 →</div>
        </div>
      </a>

      <a class="card" href="4/index.html" aria-label="前往 Gemini 問答小工具頁面">
        <img class="thumb" src="assets/gemini-chat-thumb.svg" alt="Gemini 問答小工具縮圖" />
        <div class="content">
          <div class="num">作品 04</div>
          <div class="name">Gemini 問答小工具</div>
          <div class="go">立即試用 →</div>
        </div>
      </a>

      <a class="card" href="5/index.html" aria-label="前往聊天應用頁面">
        <img class="thumb" src="assets/chat-thumb.svg" alt="聊天應用縮圖" />
        <div class="content">
          <div class="num">作品 05</div>
          <div class="name">ntfy 聊天室</div>
          <div class="go">立即聊天 →</div>
        </div>
      </a>

      <a class="card" href="6/index.html" aria-label="前往雲端記事本作品頁面">
        <img class="thumb" src="assets/chat-thumb.svg" alt="雲端記事本縮圖" />
        <div class="content">
          <div class="num">作品 06</div>
          <div class="name">雲端記事本</div>
          <div class="go">開啟作品 →</div>
        </div>
      </a>
    </section>

    <p class="footer">© 2026 武翠安作品集</p>
    <p class="footer">設計者：武翠安</p>
  </main>
</body>
</html>
